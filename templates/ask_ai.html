<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ask AI</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI",sans-serif;
}

/* FULL SCREEN BACKGROUND */
body{
  height:100vh;
  display:flex;
  background: url("https://wallpaperbat.com/img/387491-gentle-caress-wallpaper-autumn-nature-wallpaper-simple.jpg") no-repeat center center/cover;
  position:relative;
}

/* DARK OVERLAY (🔥 important for visibility) */
body::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.75); /* 👈 blur + darkness */
  backdrop-filter: blur(12px); /* 👈 strong blur */
  z-index:0;
}

/* sab content upar rahe */
.main{
  position:relative;
  z-index:1;
  display:flex;
  width:100%;
}
/* SIDEBAR */
.sidebar{
  width:260px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(15px);
  color:white;
  padding:20px;
  display:flex;
  flex-direction:column;
}

.sidebar h2{
  margin-bottom:20px;
}

.sidebar button{
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.sidebar button:hover{
  background:#1d4ed8;
}

/* CHAT AREA */
.chat-area{
  flex:1;
  display:flex;
  flex-direction:column;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
}


/* HEADER */
.header{
  padding:18px;
  color:white;
  font-size:20px;
  font-weight:600;
  border-bottom:1px solid rgba(255,255,255,0.1);
  background:rgba(0,0,0,0.4);
}

/* CHAT BOX */
.chat-box{
  flex:1;
  padding:20px;
  overflow-y:auto;
}

/* EMPTY */
.empty{
  text-align:center;
  color:#ffffff;
  margin-top:80px;
  font-size:18px;
  font-weight:500;
  opacity:0.9;
}

/* highlight text */
.empty small{
  display:block;
  margin-top:15px;
  font-size:14px;
  color:#60a5fa;
  background:rgba(255,255,255,0.1);
  padding:8px 12px;
  border-radius:10px;
  display:inline-block;
}
/* MESSAGE */
.msg{
  max-width:60%;
  padding:12px 16px;
  border-radius:15px;
  margin:10px 0;
  color:white;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.user{
  margin-left:auto;
  background:linear-gradient(to right,#2563eb,#3b82f6);
}

.ai{
  background:rgba(255,255,255,0.15);
}

/* INPUT */
.input-area{
  display:flex;
  padding:15px;
  border-top:1px solid rgba(255,255,255,0.1);
}

.input-area input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
}

.input-area button{
  margin-left:10px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

.input-area button:hover{
  background:#1d4ed8;
}

</style>
</head>

<body>

<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>🤖 Ask AI</h2>

    <button onclick="location.href='/clear-chat'">🧹 Clear Chat</button>
    <button onclick="location.href='/logout'">🚪 Logout</button>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area">

    <div class="header">AI Assistant</div>

    <div class="chat-box" id="chatBox">

      {% if chat|length == 0 %}
        <div class="empty">
          Start conversation... 🤖<br><br>
          <small>Try: startup, stock, emergency</small>
        </div>
      {% endif %}

      {% for c in chat %}
        <div class="msg {{ c.type }}">
          {{ c.msg }}
        </div>
      {% endfor %}

    </div>

    <!-- INPUT -->
    <form method="POST" class="input-area">
      <input name="query" placeholder="Ask anything..." required>
      <button type="submit">Send</button>
    </form>

  </div>

</div>

<script>
let chatBox = document.getElementById("chatBox");
chatBox.scrollTop = chatBox.scrollHeight;
</script>

</body>
</html>
