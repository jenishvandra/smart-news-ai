<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
    
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d") no-repeat center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}


.container {
  width: 400px;
  padding: 35px;
  border-radius: 20px;
  text-align: center;

  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);

  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.icon-circle {
  width: 70px;
  height: 70px;
  background: #e0ecff;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  margin: auto;
}

.icon-circle i {
  font-size: 30px;
  color: #2563eb;
}

h2 {
  text-align: center;
  margin: 15px 0 5px;
}

.subtitle {
  text-align: center;
  color: gray;
  font-size: 14px;
  margin-bottom: 20px;
}

.label {
  font-size: 14px;
  margin-top: 10px;
  margin-bottom: 5px;
}

.input-box {
  display: flex;
  align-items: center;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 10px;

  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
}

.input-box i {
  color: gray;
  margin-right: 10px;
}

.input-box input {
  border: none;
  outline: none;
  background: transparent;
  width: 100%;
  font-size: 14px;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  margin-top: 5px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(to right, #2563eb, #06b6d4);
  color: white;
  font-size: 16px;
  margin-top: 15px;
  cursor: pointer;
}

.bottom-text {
  text-align: center;
  margin-top: 15px;
  font-size: 14px;
}
h2 {
  color: #0f172a;   /* deep dark blue-black */
}

.subtitle {
  color: #475569;   /* soft gray */
}
.label {
  color: #1e293b;   /* modern dark */
  font-weight: 500;
}

.input-box input {
  color: #0f172a;
}
.input-box input::placeholder {
  color: #64748b;
}
.input-box input::placeholder {
  color: #64748b;
}
.bottom-text a {
  color: #2563eb;
  text-decoration: none;
}
</style>

</head>
<body>

<div class="container">

  <div class="icon-circle">
    <i class="fa fa-user"></i>
  </div>

  <h2>Welcome Back</h2>
  <div class="subtitle">User Portal</div>

  <form method="POST">

  <!-- EMAIL -->
  <div class="label">Email Address</div>
  <div class="input-box">
    <i class="fa fa-envelope"></i>
    <input type="email" name="email" placeholder="Enter your email" required>
  </div>

  <!-- USERNAME -->
  <div class="label">Username</div>
  <div class="input-box">
    <i class="fa fa-user"></i>
    <input type="text" name="username" placeholder="Enter your username" required>
  </div>

  <!-- PASSWORD -->
  <div class="label">Password</div>
  <div class="input-box">
    <i class="fa fa-lock"></i>
    <input type="password" name="password" placeholder="Enter your password" required>
  </div>

  <!-- OPTIONS -->
  <div class="row">
    <label><input type="checkbox" name="remember"> Remember me</label>
    <a href="#">Forgot password?</a>
  </div>

  <!-- SUBMIT -->
  <button type="submit">Sign In</button>

</form>

  <div class="bottom-text">
    Don't have an account? <a href="/signup">Sign Up</a>
  </div>

</div>

</body>
</html>
